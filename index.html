<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Random Things</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

h1{
    font-size:3rem;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card a{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Building Anonymous Things</h1>

<p class="subtitle">
A collection of weird, fun and creative software builds by Tech Dev Sahaj.
</p>

<div class="grid">

<div class="card">
<h2>🧮 Roast Calculator</h2>
<p>A calculator that judges your math skills 😂</p>
<a href="./Roast-Calculator/">Open</a>
</div>

<div class="card">
<h2>⏰ Angry Alarm</h2>
<p>An alarm that refuses to let you sleep.</p>
<a href="./Angry-Alarm/">Open</a>
</div>

<div class="card">
<h2>🐶 Desktop Pet</h2>
<p>A tiny pet that lives on your screen.</p>
<a href="./Desktop-Pet/">Open</a>
</div>

</div>

</div>

</body>
</html>
